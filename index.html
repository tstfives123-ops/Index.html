function WhatsAppButton() {
    const handleWhatsApp = () => {
        window.open('https://wa.me/919876543210?text=Hi! I%20want%20to%20order%20samosas%20from%20Samosa%20Junction%20%F0%9F%91%8D');
    };

    return (
        <motion.button
            onClick={handleWhatsApp}
            whileHover={{ scale: 1.1, y: -5 }}
            whileTap={{ scale: 0.95 }}
            className="fixed bottom-8 right-8 z-50 w-16 h-16 bg-green-500 text-white rounded-2xl shadow-2xl gold-glow border-4 border-white flex items-center justify-center text-xl shadow-lg"
        >
            💬
        </motion.button>
    );
}

function LoadingScreen() {
    const [isLoading, setIsLoading] = useState(true);
    
    useEffect(() => {
        const timer = setTimeout(() => setIsLoading(false), 2000);
        return () => clearTimeout(timer);
    }, []);

    if (!isLoading) return null;

    return (
        <div className="fixed inset-0 bg-gradient-to-r from-orange-400 to-amber-500 z-50 flex items-center justify-center">
            <motion.div 
                animate={{ scale: [1, 1.1, 1], rotate: [0, 180, 360] }}
                transition={{ duration: 2, repeat: Infinity, ease: "easeInOut" }}
                className="w-24 h-24 border-8 border-white/30 border-t-white rounded-2xl"
            />
            <div className="absolute bottom-12 text-white text-2xl font-bold">Samosa Junction</div>
        </div>
    );
}
